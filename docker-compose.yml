name: vitasync

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vitasync
      POSTGRES_USER: vitasync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitasync -d vitasync"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Migrations (runs once, then exits) ────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    working_dir: /repo/packages/db
    command: ["pnpm", "exec", "drizzle-kit", "push", "--force"]
    environment:
      DATABASE_URL: postgresql://vitasync:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vitasync
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vitasync:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vitasync
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:3001}
      FITBIT_CLIENT_ID: ${FITBIT_CLIENT_ID:-}
      FITBIT_CLIENT_SECRET: ${FITBIT_CLIENT_SECRET:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
      WITHINGS_CLIENT_ID: ${WITHINGS_CLIENT_ID:-}
      WITHINGS_CLIENT_SECRET: ${WITHINGS_CLIENT_SECRET:-}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID:-}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - external

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vitasync:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vitasync
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FITBIT_CLIENT_ID: ${FITBIT_CLIENT_ID:-}
      FITBIT_CLIENT_SECRET: ${FITBIT_CLIENT_SECRET:-}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID:-}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  # ── Web Dashboard ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-side proxy target — internal service name, never changes
      INTERNAL_API_URL: http://api:3001
      # Browser-facing API URL — set to your public domain in production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - external

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
