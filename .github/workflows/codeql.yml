name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly scan at 03:00 UTC on Mondays
    - cron: "0 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
        # Add 'python' if/when a Python service is added

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Exclude generated/dist code and test fixtures
          config: |
            paths-ignore:
              - "**/dist/**"
              - "**/node_modules/**"
              - "**/__tests__/**"
              - "**/migrations/**"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (required for CodeQL TypeScript analysis)
        run: |
          pnpm --filter @vitasync/types build
          pnpm --filter @vitasync/db build
          pnpm --filter @vitasync/provider-core build
          pnpm --filter @vitasync/provider-fitbit build
          pnpm --filter @vitasync/provider-garmin build
          pnpm --filter @vitasync/provider-strava build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
