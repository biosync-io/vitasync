name: Docker Build Check

on:
  pull_request:
    branches: [main, develop]
  # No path filter here — the workflow must always run so it can satisfy
  # required status checks even when no Docker-relevant files changed.

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect whether any Docker-relevant files changed.
  # All build jobs depend on this so they can skip cleanly on docs-only PRs.
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - "apps/api/**"
              - "apps/worker/**"
              - "apps/web/**"
              - "packages/**"
              - "pnpm-lock.yaml"
              - "**/Dockerfile"

  docker-build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        app: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: needs.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        if: needs.changes.outputs.docker == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: vitasync-${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Skip (no Docker-relevant changes)
        if: needs.changes.outputs.docker != 'true'
        run: echo "No Docker-relevant files changed — skipping build."
