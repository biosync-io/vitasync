name: Docker Publish

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options: [patch, minor, major]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/vitasync
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Bump version & tag on push to main or workflow_dispatch ─────────────
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    # Skip on tag pushes — build-and-push handles those directly.
    if: |
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push') &&
      !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          BUMP: ${{ inputs.version_bump || 'patch' }}
        run: |
          current=$(node -p "require('./package.json').version")
          IFS='.' read -ra v <<< "$current"
          major=${v[0]}; minor=${v[1]}; patch=${v[2]}
          case "$BUMP" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            *)     patch=$((patch+1)) ;;
          esac

          # Keep incrementing patch until we find a tag that doesn't exist yet
          while git rev-parse "v$major.$minor.$patch" >/dev/null 2>&1; do
            echo "Tag v$major.$minor.$patch already exists, incrementing patch..."
            patch=$((patch+1))
          done

          version="$major.$minor.$patch"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

  # ── Build and push Docker images to GHCR ─────────────────────────────────
  build-and-push:
    name: Build & Push ${{ matrix.app }}
    runs-on: ubuntu-latest
    # Run after release (main push) or directly on tag push / workflow_dispatch
    needs: [release]
    if: |
      always() &&
      (needs.release.result == 'success' || needs.release.result == 'skipped') &&
      needs.release.result != 'failure'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, worker, web]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push — derive version from the tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ needs.release.outputs.version }}" ]]; then
            # workflow_dispatch — use the version the release job bumped to
            echo "version=${{ needs.release.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Plain push to main — read the current version from package.json
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.ver.outputs.version }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          provenance: true
          sbom: true

  # ── Package and push Helm chart to GHCR ──────────────────────────────────
  helm-package:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: [release, build-and-push]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.release.result == 'success' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ needs.release.outputs.version }}" ]]; then
            echo "version=${{ needs.release.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (OCI Helm registry)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: helm package helm/vitasync --version ${{ steps.ver.outputs.version }} --app-version ${{ steps.ver.outputs.version }}

      - name: Push Helm chart to GHCR
        run: helm push vitasync-${{ steps.ver.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
