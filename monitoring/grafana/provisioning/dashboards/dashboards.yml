apiVersion: 1

providers:
  - name: "VitaSync Health Dashboards"
    orgId: 1
    folder: "VitaSync Health"
    folderUid: "vitasync-health"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
