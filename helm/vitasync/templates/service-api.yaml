{{- if .Values.api.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vitasync.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vitasync.api.selectorLabels" . | nindent 4 }}
{{- end }}
