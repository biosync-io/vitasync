{{- if .Values.web.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vitasync.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.web.labels" . | nindent 4 }}
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vitasync.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.web.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vitasync.web.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "vitasync.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "vitasync.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.web.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "vitasync.web.image" . }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.web.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "vitasync.configMapName" . }}
          env:
            - name: HOSTNAME
              value: {{ .Values.web.hostname | quote }}
            - name: PORT
              value: {{ .Values.web.service.port | quote }}
            # NEXT_PUBLIC_DEFAULT_API_KEY and DEFAULT_API_KEY both point to
            # ADMIN_API_KEY — the one key actually seeded into the database.
            # NEXT_PUBLIC_* is a build-time concept so has no effect in a
            # pre-built image; DEFAULT_API_KEY is read at runtime by /api/config.
            - name: NEXT_PUBLIC_DEFAULT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vitasync.secretName" . }}
                  key: NEXT_PUBLIC_DEFAULT_API_KEY
            # DEFAULT_API_KEY is the server-side counterpart: readable by the
            # Next.js Node.js process at runtime (unlike NEXT_PUBLIC_* which
            # is baked into the bundle at image build time).
            - name: DEFAULT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vitasync.secretName" . }}
                  key: NEXT_PUBLIC_DEFAULT_API_KEY
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.web.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.web.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
