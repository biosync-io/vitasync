{{- if and .Values.api.enabled .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vitasync.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.api.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "vitasync.api.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if and .Values.worker.enabled .Values.worker.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vitasync.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.worker.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.worker.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "vitasync.worker.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if and .Values.web.enabled .Values.web.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vitasync.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.web.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.web.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "vitasync.web.selectorLabels" . | nindent 6 }}
{{- end }}
