{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vitasync.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.labels" . | nindent 4 }}
  annotations:
    # In production, manage this secret with Sealed Secrets or External Secrets Operator
    # and set secrets.existingSecret to your pre-existing secret name.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.ENCRYPTION_KEY | quote }}
  {{- if .Values.secrets.FITBIT_CLIENT_ID }}
  FITBIT_CLIENT_ID: {{ .Values.secrets.FITBIT_CLIENT_ID | quote }}
  FITBIT_CLIENT_SECRET: {{ .Values.secrets.FITBIT_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.GARMIN_CONSUMER_KEY }}
  GARMIN_CONSUMER_KEY: {{ .Values.secrets.GARMIN_CONSUMER_KEY | quote }}
  GARMIN_CONSUMER_SECRET: {{ .Values.secrets.GARMIN_CONSUMER_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.WITHINGS_CLIENT_ID }}
  WITHINGS_CLIENT_ID: {{ .Values.secrets.WITHINGS_CLIENT_ID | quote }}
  WITHINGS_CLIENT_SECRET: {{ .Values.secrets.WITHINGS_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.POLAR_CLIENT_ID }}
  POLAR_CLIENT_ID: {{ .Values.secrets.POLAR_CLIENT_ID | quote }}
  POLAR_CLIENT_SECRET: {{ .Values.secrets.POLAR_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_ID: {{ .Values.secrets.STRAVA_CLIENT_ID | quote }}
  STRAVA_CLIENT_SECRET: {{ .Values.secrets.STRAVA_CLIENT_SECRET | quote }}
  {{- end }}
{{- end }}
