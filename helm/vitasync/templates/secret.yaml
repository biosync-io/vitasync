{{- if not .Values.secrets.existingSecret }}
{{/*
  ── Security guard ─────────────────────────────────────────────────────────
  Fail fast if the user left any of the three mandatory secrets at their
  insecure placeholder defaults. These checks are skipped when
  secrets.existingSecret is set (the user is supplying the Secret themselves).
*/}}
{{- if eq .Values.secrets.JWT_SECRET "change-me-to-a-long-random-string" }}
{{- fail "\n\nSECURITY ERROR: secrets.JWT_SECRET is still set to the placeholder default.\nGenerate a secure value and pass it via --set or a values override:\n  openssl rand -hex 32" }}
{{- end }}
{{- if eq .Values.secrets.ENCRYPTION_KEY "change-me-32-byte-hex-encoded-key" }}
{{- fail "\n\nSECURITY ERROR: secrets.ENCRYPTION_KEY is still set to the placeholder default.\nGenerate a 64-char hex key and pass it via --set or a values override:\n  openssl rand -hex 32" }}
{{- end }}
{{- if eq .Values.secrets.ADMIN_API_KEY "vs_live_changeme_for_production" }}
{{- fail "\n\nSECURITY ERROR: secrets.ADMIN_API_KEY is still set to the placeholder default.\nSet a strong random API key via --set secrets.ADMIN_API_KEY=<value>" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vitasync.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
    # Retain this Secret across `helm uninstall` so data is not lost accidentally.
    # Remove this annotation if you want the Secret deleted with the release.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Connection URLs are computed from postgresql / redis values.
  # To use your own pre-existing secret, set secrets.existingSecret.
  DATABASE_URL: {{ include "vitasync.databaseUrl" . | quote }}
  REDIS_URL: {{ include "vitasync.redisUrl" . | quote }}

  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.ENCRYPTION_KEY | quote }}
  ADMIN_API_KEY: {{ .Values.secrets.ADMIN_API_KEY | quote }}
  # NEXT_PUBLIC_DEFAULT_API_KEY must always equal ADMIN_API_KEY so the web
  # dashboard's runtime fallback key is the same one seeded into the database.
  NEXT_PUBLIC_DEFAULT_API_KEY: {{ .Values.secrets.ADMIN_API_KEY | quote }}

  {{- if .Values.secrets.FITBIT_CLIENT_ID }}
  FITBIT_CLIENT_ID: {{ .Values.secrets.FITBIT_CLIENT_ID | quote }}
  FITBIT_CLIENT_SECRET: {{ .Values.secrets.FITBIT_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.GARMIN_CONSUMER_KEY }}
  GARMIN_CONSUMER_KEY: {{ .Values.secrets.GARMIN_CONSUMER_KEY | quote }}
  GARMIN_CONSUMER_SECRET: {{ .Values.secrets.GARMIN_CONSUMER_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_ID: {{ .Values.secrets.STRAVA_CLIENT_ID | quote }}
  STRAVA_CLIENT_SECRET: {{ .Values.secrets.STRAVA_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.WHOOP_CLIENT_ID }}
  WHOOP_CLIENT_ID: {{ .Values.secrets.WHOOP_CLIENT_ID | quote }}
  WHOOP_CLIENT_SECRET: {{ .Values.secrets.WHOOP_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.WITHINGS_CLIENT_ID }}
  WITHINGS_CLIENT_ID: {{ .Values.secrets.WITHINGS_CLIENT_ID | quote }}
  WITHINGS_CLIENT_SECRET: {{ .Values.secrets.WITHINGS_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.FITBIT_WEBHOOK_SECRET }}
  FITBIT_WEBHOOK_SECRET: {{ .Values.secrets.FITBIT_WEBHOOK_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.GARMIN_WEBHOOK_SECRET }}
  GARMIN_WEBHOOK_SECRET: {{ .Values.secrets.GARMIN_WEBHOOK_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.STRAVA_WEBHOOK_SECRET }}
  STRAVA_WEBHOOK_SECRET: {{ .Values.secrets.STRAVA_WEBHOOK_SECRET | quote }}
  {{- end }}
  {{- if .Values.secrets.WHOOP_WEBHOOK_SECRET }}
  WHOOP_WEBHOOK_SECRET: {{ .Values.secrets.WHOOP_WEBHOOK_SECRET | quote }}
  {{- end }}
{{- end }}
