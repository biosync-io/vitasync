{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vitasync.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.web.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "vitasync.web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
