{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vitasync.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitasync.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    {{- toYaml .Values.migrations.annotations | nindent 4 }}
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "vitasync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- include "vitasync.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "vitasync.serviceAccountName" . }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready \
                -h {{ include "vitasync.postgresqlHost" . }} \
                -p {{ include "vitasync.postgresqlPort" . }} \
                -U {{ include "vitasync.postgresqlUsername" . }}; do
                echo "Waiting for PostgreSQL to be ready...";
                sleep 2;
              done;
              echo "PostgreSQL is ready."
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: migrate
          image: {{ include "vitasync.migrations.image" . }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command: ["node", "apps/api/dist/migrate.js"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: {{ include "vitasync.configMapName" . }}
            - secretRef:
                name: {{ include "vitasync.secretName" . }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
